<script>
(function() {
  var data = DATA.data;
  var headers = DATA.columns;
  var tbody = document.getElementById('catalogBody');

  // Populate table body
  data.forEach(function(row) {
    var tr = document.createElement('tr');
    headers.forEach(function(h, idx) {
      var td = document.createElement('td');
      td.textContent = row[idx] !== undefined && row[idx] !== null ? row[idx] : '';
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });

  // Initialize DataTable
  $('#catalog').DataTable({
    pageLength: 25,
    lengthMenu: [10, 25, 50, 100],
    order: [[0, 'asc']],
    language: { search: 'Filter:' }
  });

  // Update subtitle
  var hubs = new Set(data.map(function(r) { return r[0]; }));
  document.querySelector('.subtitle').textContent = data.length + ' datasets from ' + hubs.size + ' hubs';
})();
</script>
